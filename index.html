<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>HTML Viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<style>
  :root{
    --bar-h: 56px;
    --safe-top: env(safe-area-inset-top, 0px);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    margin:0; padding:0; height:100%; width:100%;
    background:#000; color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overscroll-behavior:none;
  }
  /* ---------- Viewer (full screen iframe) ---------- */
  #viewer{
    position:fixed; inset:0;
    width:100%; height:100%;
    border:0; margin:0; padding:0;
    background:#fff;
    display:none;
  }
  /* ---------- Welcome / empty state ---------- */
  #welcome{
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center; padding:24px;
    background:radial-gradient(120% 120% at 50% 0%, #1c2230 0%, #0a0c10 60%);
    gap:18px;
  }
  #welcome h1{ font-size:22px; font-weight:600; margin:0; }
  #welcome p{ font-size:15px; line-height:1.5; color:#aab2c0; margin:0; max-width:300px; }
  .big-btn{
    display:inline-flex; align-items:center; gap:10px;
    background:#2f6df6; color:#fff; border:0; border-radius:14px;
    font-size:17px; font-weight:600; padding:15px 26px;
    cursor:pointer; box-shadow:0 6px 20px rgba(47,109,246,.35);
  }
  .big-btn:active{ transform:scale(.97); }
  .hint{ font-size:13px; color:#7c8696; margin-top:8px; }

  /* ---------- Pull indicator ---------- */
  #pull{
    position:fixed; left:0; right:0; top:0;
    display:flex; align-items:flex-end; justify-content:center;
    pointer-events:none;
    height:0; overflow:hidden;
    z-index:40;
    transition:none;
  }
  #pull .grip{
    margin-bottom:10px;
    display:flex; flex-direction:column; align-items:center; gap:6px;
    color:#fff; opacity:.0;
    text-shadow:0 1px 4px rgba(0,0,0,.6);
  }
  #pull .bar{
    width:40px; height:5px; border-radius:3px; background:#fff;
    box-shadow:0 1px 6px rgba(0,0,0,.5);
  }
  #pull .lbl{ font-size:12px; font-weight:600; }

  /* ---------- Top toolbar (folder button) ---------- */
  #bar{
    position:fixed; left:0; right:0; top:0;
    padding-top:var(--safe-top);
    height:calc(var(--bar-h) + var(--safe-top));
    background:rgba(17,20,27,.92);
    -webkit-backdrop-filter:saturate(160%) blur(14px);
    backdrop-filter:saturate(160%) blur(14px);
    border-bottom:1px solid rgba(255,255,255,.08);
    display:flex; align-items:center; gap:10px;
    padding-left:12px; padding-right:10px;
    transform:translateY(-110%);
    transition:transform .28s cubic-bezier(.22,.61,.36,1);
    z-index:60;
  }
  #bar.show{ transform:translateY(0); }
  #bar .folder{
    display:inline-flex; align-items:center; gap:8px;
    background:#2f6df6; color:#fff; border:0; border-radius:11px;
    font-size:15px; font-weight:600; padding:10px 14px; cursor:pointer;
    white-space:nowrap;
  }
  #bar .folder:active{ transform:scale(.96); }
  #bar .name{
    flex:1; min-width:0;
    font-size:14px; color:#c7cdd8;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  #bar .close{
    background:transparent; border:0; color:#c7cdd8;
    font-size:22px; line-height:1; padding:8px 10px; cursor:pointer;
  }
  #bar .close:active{ color:#fff; }

  .ic{ width:18px; height:18px; display:inline-block; vertical-align:middle; }

  /* small toast */
  #toast{
    position:fixed; left:50%; bottom:calc(28px + env(safe-area-inset-bottom,0px));
    transform:translateX(-50%) translateY(20px);
    background:rgba(20,22,28,.95); color:#fff;
    padding:11px 16px; border-radius:12px; font-size:14px;
    opacity:0; pointer-events:none; transition:opacity .25s, transform .25s;
    z-index:80; max-width:80vw; text-align:center;
    border:1px solid rgba(255,255,255,.1);
  }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

  <!-- The selected HTML is rendered here, full screen -->
  <iframe id="viewer" referrerpolicy="no-referrer"></iframe>

  <!-- Shown when nothing has been chosen yet -->
  <div id="welcome">
    <svg class="ic" style="width:46px;height:46px;color:#2f6df6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
    <h1>HTML‑Viewer</h1>
    <p>Wähle eine HTML‑Datei aus iCloud Drive / Dateien aus. Sie wird im Vollbild angezeigt und beim nächsten Öffnen automatisch wieder geladen.</p>
    <button class="big-btn" id="pickWelcome">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
      Datei auswählen
    </button>
    <div class="hint">Tipp: später mit langem Runterziehen von oben den Ordner‑Button öffnen.</div>
  </div>

  <!-- Pull-to-reveal indicator -->
  <div id="pull"><div class="grip"><div class="bar"></div><div class="lbl">Loslassen für Ordner</div></div></div>

  <!-- Top toolbar with folder button -->
  <div id="bar">
    <button class="folder" id="pickBar">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
      Datei wählen
    </button>
    <span class="name" id="fileName"></span>
    <button class="close" id="closeBar" aria-label="Schließen">&times;</button>
  </div>

  <div id="toast"></div>

  <!-- Native file picker (iOS shows Files / iCloud Drive) -->
  <input id="fileInput" type="file" accept=".html,.htm,text/html" style="display:none">

<script>
(function(){
  "use strict";

  var KEY_HTML = "viewer_html_content_v1";
  var KEY_NAME = "viewer_html_name_v1";
  var PULL_THRESHOLD = 110;   // px you must drag down to reveal the folder button
  var PULL_MAX = 170;         // visual cap for the indicator

  var viewer   = document.getElementById("viewer");
  var welcome  = document.getElementById("welcome");
  var bar      = document.getElementById("bar");
  var pull     = document.getElementById("pull");
  var grip     = pull.querySelector(".grip");
  var fileName = document.getElementById("fileName");
  var fileInput= document.getElementById("fileInput");
  var toastEl  = document.getElementById("toast");

  var barTimer = null;

  // ---------- Toast ----------
  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastEl._t);
    toastEl._t = setTimeout(function(){ toastEl.classList.remove("show"); }, 2200);
  }

  // ---------- Persistence ----------
  function save(html, name){
    try{
      localStorage.setItem(KEY_HTML, html);
      localStorage.setItem(KEY_NAME, name || "");
    }catch(e){
      toast("Datei zu groß zum dauerhaften Speichern – wird nur jetzt angezeigt.");
    }
  }

  function loadSaved(){
    try{ return { html: localStorage.getItem(KEY_HTML), name: localStorage.getItem(KEY_NAME) || "" }; }
    catch(e){ return { html:null, name:"" }; }
  }

  // ---------- Display ----------
  function showContent(html, name){
    welcome.style.display = "none";
    viewer.style.display  = "block";
    fileName.textContent  = name || "";
    // srcdoc keeps it same-origin so we can attach the pull gesture inside it
    viewer.srcdoc = html;
  }

  // ---------- Toolbar ----------
  function showBar(){
    bar.classList.add("show");
    clearTimeout(barTimer);
    barTimer = setTimeout(hideBar, 8000); // auto-hide if not used
  }
  function hideBar(){
    bar.classList.remove("show");
    clearTimeout(barTimer);
  }

  // ---------- Pull indicator visuals ----------
  function setPull(dy){
    var h = Math.max(0, Math.min(dy, PULL_MAX));
    pull.style.height = h + "px";
    var ratio = Math.min(dy / PULL_THRESHOLD, 1);
    grip.style.opacity = ratio.toFixed(2);
    grip.querySelector(".lbl").textContent =
      dy >= PULL_THRESHOLD ? "Loslassen für Ordner" : "Weiter ziehen…";
  }
  function resetPull(){
    pull.style.height = "0px";
    grip.style.opacity = "0";
  }

  // ---------- Attach the pull-down gesture INSIDE the iframe ----------
  // srcdoc => same origin => we can listen on the inner document.
  function attachGesture(){
    var doc, win;
    try{ doc = viewer.contentDocument; win = viewer.contentWindow; }
    catch(e){ doc = null; }
    if(!doc){ enableFallbackCatcher(); return; }

    var startY = null, active = false, lastDy = 0;

    doc.addEventListener("touchstart", function(e){
      if(e.touches.length !== 1){ active = false; startY = null; return; }
      // only start a "pull" if the inner page is scrolled to the very top
      if((win.scrollY || doc.documentElement.scrollTop || 0) <= 0){
        startY = e.touches[0].clientY; active = true; lastDy = 0;
      }else{ active = false; startY = null; }
    }, {passive:true});

    doc.addEventListener("touchmove", function(e){
      if(!active || startY === null) return;
      var dy = e.touches[0].clientY - startY;
      if(dy > 0){ lastDy = dy; setPull(dy); }
      else { lastDy = 0; resetPull(); }
    }, {passive:true});

    function end(){
      if(active && lastDy >= PULL_THRESHOLD){ showBar(); }
      active = false; startY = null; lastDy = 0; resetPull();
    }
    doc.addEventListener("touchend", end, {passive:true});
    doc.addEventListener("touchcancel", end, {passive:true});
  }

  // ---------- Fallback: invisible strip at the top edge ----------
  // Used only if the iframe content can't be reached (e.g. cross-origin).
  function enableFallbackCatcher(){
    var c = document.getElementById("__catcher");
    if(c) return;
    c = document.createElement("div");
    c.id = "__catcher";
    c.style.cssText = "position:fixed;left:0;right:0;top:0;height:44px;z-index:50;background:transparent;";
    document.body.appendChild(c);
    var startY=null, lastDy=0, active=false;
    c.addEventListener("touchstart", function(e){
      startY = e.touches[0].clientY; active = true; lastDy = 0;
    }, {passive:true});
    c.addEventListener("touchmove", function(e){
      if(!active) return;
      var dy = e.touches[0].clientY - startY;
      if(dy>0){ lastDy = dy; setPull(dy); } else { lastDy=0; resetPull(); }
    }, {passive:true});
    function end(){
      if(active && lastDy >= PULL_THRESHOLD){ showBar(); }
      active=false; startY=null; lastDy=0; resetPull();
    }
    c.addEventListener("touchend", end, {passive:true});
    c.addEventListener("touchcancel", end, {passive:true});
  }

  viewer.addEventListener("load", attachGesture);

  // ---------- File picking ----------
  function openPicker(){ fileInput.value = ""; fileInput.click(); }

  fileInput.addEventListener("change", function(){
    var f = fileInput.files && fileInput.files[0];
    if(!f) return;
    var reader = new FileReader();
    reader.onload = function(){
      var html = String(reader.result || "");
      save(html, f.name);
      showContent(html, f.name);
      hideBar();
      toast("Geladen: " + f.name);
    };
    reader.onerror = function(){ toast("Datei konnte nicht gelesen werden."); };
    reader.readAsText(f);
  });

  document.getElementById("pickWelcome").addEventListener("click", openPicker);
  document.getElementById("pickBar").addEventListener("click", openPicker);
  document.getElementById("closeBar").addEventListener("click", hideBar);

  // ---------- Start: restore last file if present ----------
  var saved = loadSaved();
  if(saved.html){ showContent(saved.html, saved.name); }
  else{ welcome.style.display = "flex"; viewer.style.display = "none"; }

})();
</script>
</body>
</html>
