<style>
  :root{
    --red: #e23317;
    --safe-top: env(safe-area-inset-top, 0px);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    margin:0; padding:0; height:100%; width:100%;
    background:var(--red);
    overscroll-behavior:none;
  }

  /* Selected HTML, full screen */
  #viewer{
    position:fixed; inset:0; width:100%; height:100%;
    border:0; margin:0; padding:0; background:#fff; display:none;
  }

  /* Empty state: red screen, centered white upload circle */
  #welcome{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:var(--red);
  }

  /* White round icon button (used both centered and in the pull bar) */
  .circle{
    border:0; cursor:pointer;
    background:#fff; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    color:var(--red);
    box-shadow:0 8px 26px rgba(0,0,0,.18);
  }
  .circle:active{ transform:scale(.95); }
  .circle.big{ width:96px; height:96px; }
  .circle.small{ width:56px; height:56px; }

  /* Pull-to-reveal indicator (just the white circle, no text) */
  #pull{
    position:fixed; left:0; right:0; top:0;
    display:flex; align-items:flex-end; justify-content:center;
    pointer-events:none; height:0; overflow:hidden; z-index:40;
  }
  #pull .dot{
    margin-bottom:10px; width:40px; height:40px; border-radius:50%;
    background:#fff; color:var(--red);
    display:flex; align-items:center; justify-content:center;
    opacity:0; box-shadow:0 6px 18px rgba(0,0,0,.22);
  }

  /* Top bar revealed after a long pull: just the white circle button */
  #bar{
    position:fixed; left:0; right:0; top:0;
    padding-top:calc(var(--safe-top) + 10px); padding-bottom:10px;
    display:flex; justify-content:center;
    transform:translateY(-130%);
    transition:transform .28s cubic-bezier(.22,.61,.36,1);
    z-index:60; pointer-events:none;
  }
  #bar.show{ transform:translateY(0); }
  #bar .circle{ pointer-events:auto; }
</style>
</head>
<body>

  <iframe id="viewer" referrerpolicy="no-referrer"></iframe>

  <!-- Empty state -->
  <div id="welcome">
    <button class="circle big" id="pickWelcome" aria-label="Datei hochladen">
      <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M7 9l5-5 5 5"/><path d="M5 16v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2"/></svg>
    </button>
  </div>

  <!-- Pull indicator -->
  <div id="pull"><div class="dot">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M7 9l5-5 5 5"/><path d="M5 16v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2"/></svg>
  </div></div>

  <!-- Top bar after long pull -->
  <div id="bar">
    <button class="circle small" id="pickBar" aria-label="Datei hochladen">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M7 9l5-5 5 5"/><path d="M5 16v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2"/></svg>
    </button>
  </div>

  <input id="fileInput" type="file" accept=".html,.htm,text/html" style="display:none">

<script>
(function(){
  "use strict";

  var KEY_HTML = "viewer_html_v1";
  var KEY_NAME = "viewer_name_v1";
  var PULL_THRESHOLD = 110;
  var PULL_MAX = 160;

  var viewer   = document.getElementById("viewer");
  var welcome  = document.getElementById("welcome");
  var bar      = document.getElementById("bar");
  var pull     = document.getElementById("pull");
  var dot      = pull.querySelector(".dot");
  var fileInput= document.getElementById("fileInput");
  var barTimer = null;

  // ---------- Persistence ----------
  function save(html, name){
    try{ localStorage.setItem(KEY_HTML, html); localStorage.setItem(KEY_NAME, name || ""); }
    catch(e){}
  }
  function loadSaved(){
    try{ return { html: localStorage.getItem(KEY_HTML) }; }
    catch(e){ return { html:null }; }
  }

  // ---------- Display ----------
  function showContent(html){
    welcome.style.display = "none";
    viewer.style.display  = "block";
    viewer.srcdoc = html; // same-origin -> we can attach the pull gesture inside
  }

  // ---------- Toolbar ----------
  function showBar(){
    bar.classList.add("show");
    clearTimeout(barTimer);
    barTimer = setTimeout(hideBar, 6000);
  }
  function hideBar(){ bar.classList.remove("show"); clearTimeout(barTimer); }

  // ---------- Pull visuals ----------
  function setPull(dy){
    var h = Math.max(0, Math.min(dy, PULL_MAX));
    pull.style.height = h + "px";
    dot.style.opacity = Math.min(dy / PULL_THRESHOLD, 1).toFixed(2);
  }
  function resetPull(){ pull.style.height = "0px"; dot.style.opacity = "0"; }

  // ---------- Pull gesture inside the iframe ----------
  function attachGesture(){
    var doc, win;
    try{ doc = viewer.contentDocument; win = viewer.contentWindow; }
    catch(e){ doc = null; }
    if(!doc){ enableFallbackCatcher(); return; }

    var startY = null, active = false, lastDy = 0;
    doc.addEventListener("touchstart", function(e){
      if(e.touches.length !== 1){ active = false; startY = null; return; }
      if((win.scrollY || doc.documentElement.scrollTop || 0) <= 0){
        startY = e.touches[0].clientY; active = true; lastDy = 0;
      }else{ active = false; startY = null; }
    }, {passive:true});
    doc.addEventListener("touchmove", function(e){
      if(!active || startY === null) return;
      var dy = e.touches[0].clientY - startY;
      if(dy > 0){ lastDy = dy; setPull(dy); } else { lastDy = 0; resetPull(); }
    }, {passive:true});
    function end(){
      if(active && lastDy >= PULL_THRESHOLD){ showBar(); }
      active = false; startY = null; lastDy = 0; resetPull();
    }
    doc.addEventListener("touchend", end, {passive:true});
    doc.addEventListener("touchcancel", end, {passive:true});
  }

  function enableFallbackCatcher(){
    if(document.getElementById("__catcher")) return;
    var c = document.createElement("div");
    c.id = "__catcher";
    c.style.cssText = "position:fixed;left:0;right:0;top:0;height:46px;z-index:50;background:transparent;";
    document.body.appendChild(c);
    var startY=null, lastDy=0, active=false;
    c.addEventListener("touchstart", function(e){ startY=e.touches[0].clientY; active=true; lastDy=0; }, {passive:true});
    c.addEventListener("touchmove", function(e){
      if(!active) return;
      var dy = e.touches[0].clientY - startY;
      if(dy>0){ lastDy=dy; setPull(dy); } else { lastDy=0; resetPull(); }
    }, {passive:true});
    function end(){ if(active && lastDy>=PULL_THRESHOLD){ showBar(); } active=false; startY=null; lastDy=0; resetPull(); }
    c.addEventListener("touchend", end, {passive:true});
    c.addEventListener("touchcancel", end, {passive:true});
  }

  viewer.addEventListener("load", attachGesture);

  // ---------- File picking ----------
  function openPicker(){ fileInput.value = ""; fileInput.click(); }
  fileInput.addEventListener("change", function(){
    var f = fileInput.files && fileInput.files[0];
    if(!f) return;
    var reader = new FileReader();
    reader.onload = function(){
      var html = String(reader.result || "");
      save(html, f.name);
      showContent(html);
      hideBar();
    };
    reader.readAsText(f);
  });

  document.getElementById("pickWelcome").addEventListener("click", openPicker);
  document.getElementById("pickBar").addEventListener("click", openPicker);

  // ---------- Start ----------
  var saved = loadSaved();
  if(saved.html){ showContent(saved.html); }
  else{ welcome.style.display = "flex"; viewer.style.display = "none"; }

})();
</script>
</body>
</html>
